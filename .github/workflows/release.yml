# GitHub Actions workflow for Maven Central release
# Triggers on GitHub Release creation (published)

name: Release to Maven Central

on:
  release:
    types: [published]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch all tags

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Set release version (skip, already set before tag)
        run: echo "Version should already be set by pre-tag commit."

      - name: Build and publish to Maven Central
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
          GPG_PASSPHRASE: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
        run: |
          ./gradlew clean build publish --no-daemon --stacktrace \
            -PossrhUsername=$OSSRH_USERNAME \
            -PossrhPassword=$OSSRH_PASSWORD \
            -Psigning.key=$GPG_PRIVATE_KEY \
            -Psigning.password=$GPG_PASSPHRASE

      - name: Archive built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: build/libs/*.jar

