# GitHub Actions workflow for Maven Central release
# Triggers on GitHub Release creation (published)

name: Release to Maven Central

on:
  release:
    types: [published]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch all tags

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Set release version (skip, already set before tag)
        run: echo "Version should already be set by pre-tag commit."

      - name: Build and publish to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_TOKEN_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_SECRET_KEY }}
          GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_SECRET_KEY_PASSWORD }}
        run: |
          test -n "$MAVEN_CENTRAL_USERNAME" || (echo "Missing secret: MAVEN_CENTRAL_USERNAME" && exit 1)
          test -n "$MAVEN_CENTRAL_PASSWORD" || (echo "Missing secret: MAVEN_CENTRAL_PASSWORD" && exit 1)
          ./gradlew clean build publish --no-daemon --stacktrace \
            -PossrhUsername="$MAVEN_CENTRAL_USERNAME" \
            -PossrhPassword="$MAVEN_CENTRAL_PASSWORD"

      - name: Finalize upload in Maven Central Portal
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_TOKEN_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}
        run: |
          AUTH=$(printf "%s:%s" "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64)
          curl --fail-with-body \
            -H "Authorization: Bearer $AUTH" \
            -X POST "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/it.fabioformosa?publishing_type=automatic"

      - name: Archive built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: build/libs/*.jar
